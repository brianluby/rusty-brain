# Workspace Contract: Root Cargo.toml
# This defines the expected structure of the workspace manifest.
# Implementation must match this contract.

[workspace]
members = ["crates/*"]
resolver = "3"

[workspace.package]
edition = "2024"
rust-version = "1.85.0"
# license, repository, authors to be set per project

[workspace.dependencies]
# Core storage
memvid-core = { git = "https://github.com/brianluby/memvid/", rev = "fbddef4bff6ac756f91724681234243e98d5ba04" }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error handling
thiserror = "2.0"

# Async runtime
tokio = { version = "1", features = ["full"] }

# Logging
tracing = "0.1"

# Time & IDs
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }

# CLI
clap = { version = "4", features = ["derive"] }

# Versioning
semver = "1"

[workspace.lints.clippy]
all = "warn"
pedantic = "warn"
correctness = "deny"

[workspace.lints.rust]
unsafe_code = "forbid"
