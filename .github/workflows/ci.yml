name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.85.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy lint
        run: cargo clippy --workspace -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Release build
        run: cargo build --workspace --release

  # Manifest drift check — ensures install.sh inline copies match packaging/ canonical files
  manifest-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check manifest drift
        run: sh tests/check_manifest_drift.sh

  # Installer script tests (bats for POSIX, Pester for Windows)
  installer-tests-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Run install script tests
        run: bats tests/install_script_test.bats

  installer-tests-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run install script tests
        shell: pwsh
        run: Invoke-Pester -Path tests/install_script_test.ps1 -CI

  # Fuzz smoke test — required 10s smoke per target, optional extended 60s runs.
  # The short smoke tests are fail-closed (will fail the job on crash).
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: nightly

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      # Required short smoke tests (fail-closed)
      - name: Fuzz compression smoke (10s)
        run: cd crates/compression && cargo +nightly fuzz run compression_fuzz -- -max_total_time=10

      - name: Fuzz hook JSON smoke (10s)
        run: cd crates/hooks && cargo +nightly fuzz run hook_json_fuzz -- -max_total_time=10

      - name: Fuzz search query smoke (10s)
        run: cd crates/core && cargo +nightly fuzz run search_query_fuzz -- -max_total_time=10

      # Extended runs (informational, won't block PR)
      - name: Fuzz compression extended (60s)
        run: cd crates/compression && cargo +nightly fuzz run compression_fuzz -- -max_total_time=60
        continue-on-error: true

      - name: Fuzz hook JSON extended (60s)
        run: cd crates/hooks && cargo +nightly fuzz run hook_json_fuzz -- -max_total_time=60
        continue-on-error: true

      - name: Fuzz search query extended (60s)
        run: cd crates/core && cargo +nightly fuzz run search_query_fuzz -- -max_total_time=60
        continue-on-error: true
